apiVersion: apps/v1
kind: Deployment
metadata:
  name: restoct-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: restoct-app
  template:
    metadata:
      labels:
        app: restoct-app
    spec:
      containers:
        - name: restoct-app
          image: restoct-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8089
---
apiVersion: v1
kind: Service
metadata:
  name: restoct-service
spec:
  type: NodePort
  selector:
    app: restoct-app
  ports:
    - port: 8089
      targetPort: 8089